<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>QueFiestaApp</title>
  <script>
    (function() {
      var path = window.location.pathname;

      // Si es la raíz o solo tiene barras → mostrar landing
      if (!path || path === '/' || path === '/index.html' || path.replace(/\//g, '') === '') {
        window.location.replace('/index.html');
        return;
      }

      var segments = path.replace(/^\//, '').replace(/\/$/, '').split('/');

      if (segments[0] === 'admin' && segments[1]) {
        window.location.replace('/admin.html?tenant=' + segments[1] + window.location.hash);
      } else if (segments[0] && segments[0] !== '404' && segments[0] !== 'index.html' 
                 && segments[0] !== 'empresas.html' && segments[0] !== 'admin.html'
                 && segments[0] !== 'superadmin.html') {
        window.location.replace('/empresas.html?salon=' + segments[0] + window.location.hash);
      } else {
        window.location.replace('/index.html');
      }
    })();
  </script>
</head>
<body></body>
</html>
