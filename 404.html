<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>QueFiestaApp</title>
  <script>
    (function() {
      var path = window.location.pathname;
      var segments = path.replace(/^\//, '').replace(/\/$/, '').split('/');

      if (segments[0] === 'admin' && segments[1]) {
        // /admin/salonfeliz → admin.html?tenant=salonfeliz
        window.location.replace(
          '/admin.html?tenant=' + segments[1] +
          window.location.hash
        );
      } else if (segments[0] && segments[0] !== '404' && segments[0] !== 'landing-quefiestaapp.html') {
        // /salonfeliz → index.html con ?salon= pero luego replaceState limpia la URL
        var newUrl = '/?salon=' + segments[0] + window.location.hash;
        window.location.replace(newUrl);
      } else {
        window.location.replace('/');
      }
    })();
  </script>
</head>
<body></body>
</html>
